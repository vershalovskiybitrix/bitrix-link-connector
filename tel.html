<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Позвоните нам</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; color: #333; background: #fff; padding: 20px; }
.wrap { text-align: center; max-width: 360px; margin: 40px auto; padding: 24px 8px; }
.tel-ico { width: 56px; height: 56px; margin: 0 auto 16px; display: block; }
h2 { font-size: 17px; font-weight: 600; color: #1a1a1a; margin-bottom: 18px; }
.num { display: inline-block; font-size: 22px; font-weight: 600; color: #34A853; text-decoration: none; word-break: break-all; margin-bottom: 20px; line-height: 1.4; }
.num:hover { text-decoration: underline; }
.btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: #34A853; color: #fff; transition: background .15s; }
.btn:hover { background: #2c9247; }
.copied { color: #27ae60; font-size: 13px; margin-top: 10px; height: 16px; }
.hint { font-size: 12px; color: #999; margin-top: 16px; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <svg class="tel-ico" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="20" r="20" fill="#34A853"/>
    <path d="M26.5 23.2l-2.6-1.1c-.4-.2-.9-.1-1.2.2l-1.1 1.1c-1.9-1-3.5-2.6-4.5-4.5l1.1-1.1c.3-.3.4-.8.2-1.2l-1.1-2.6c-.2-.5-.8-.8-1.3-.6-1.2.3-2.2 1.4-2.1 2.7.3 5.6 4.8 10.1 10.4 10.4 1.3.1 2.4-.9 2.7-2.1.1-.5-.1-1.1-.6-1.3z" fill="#fff"/>
  </svg>
  <h2>Позвоните или напишите нам</h2>
  <a id="tel-num" class="num" href="#">—</a>
  <button class="btn" id="tel-copy">Скопировать номер</button>
  <div class="copied" id="tel-copied"></div>
  <p class="hint">Нажмите на номер, чтобы позвонить с телефона, или скопируйте его.</p>
</div>
<script>
var phone = new URLSearchParams(window.location.search).get('num') || '';
var clean = phone.replace(/[^\d+]/g, '');
var num    = document.getElementById('tel-num');
var btn    = document.getElementById('tel-copy');
var copied = document.getElementById('tel-copied');

num.textContent = phone || '—';
num.href = clean ? 'tel:' + clean : '#';

btn.addEventListener('click', function() {
  if (!phone) return;
  function done() {
    copied.textContent = '✓ Скопировано';
    setTimeout(function() { copied.textContent = ''; }, 2500);
  }
  function fallback() {
    var ta = document.createElement('textarea');
    ta.value = phone; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); }
    catch(e) { copied.textContent = phone; }
    document.body.removeChild(ta);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(phone).then(done, fallback);
  } else { fallback(); }
});
</script>
</body>
</html>
